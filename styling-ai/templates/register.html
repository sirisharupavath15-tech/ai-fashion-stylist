<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-800 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded shadow w-80">

<h2 class="text-2xl font-bold mb-6 text-center">Register</h2>

<form action="/register_user" method="post">

<input type="text" name="username" placeholder="Username"
class="w-full border p-2 mb-4">

<input type="password" name="password" placeholder="Password"
class="w-full border p-2 mb-4">

<button class="bg-green-500 text-white w-full py-2 rounded">
Register
</button>

</form>

<a href="/" class="block text-center mt-4 text-blue-500">
Back to Login
</a>

</div>

</body>
</html>
